name: Build and publish DamCoNuong

on:
  push:
    branches:
      - main
    paths:
      - "src/vi/damconuong/**"
      - ".github/scripts/**"
      - ".github/workflows/publish-damconuong.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-damconuong
  cancel-in-progress: true

env:
  MODULE_PATH: ":src:vi:damconuong:assembleRelease"
  DISTRIBUTION_REPO: "DTD2604/extensions"

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        shell: bash
        run: |
          set -euo pipefail

          printf '%s' "${{ secrets.SIGNING_KEY }}" \
            | base64 --decode \
            > signingkey.jks

          test -s signingkey.jks

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build release APK
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew "$MODULE_PATH" \
            --stacktrace \
            --no-daemon

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find src/vi/damconuong/build/outputs/apk/release \
            -type f \
            -name '*.apk' \
            | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "Không tìm thấy APK"
            find src/vi/damconuong/build -type f -name '*.apk' || true
            exit 1
          fi

          echo "APK_PATH=$APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: damconuong-apk
          path: |
            ${{ steps.apk.outputs.path }}
            src/vi/damconuong/build/keiyoushi-source-info.json
          retention-days: 1

      - name: Remove signing key
        if: always()
        run: rm -f signingkey.jks

  publish:
    name: Publish extension repository
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: damconuong-apk
          path: ~/apk-artifacts/damconuong

      - name: Checkout source scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          persist-credentials: false

      - name: Checkout distribution repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DISTRIBUTION_REPO }}
          token: ${{ secrets.REPO_TOKEN }}
          ref: repo
          path: repo
          persist-credentials: true

      - name: Install Python dependencies
        run: pip install protobuf

      - name: Publish repository
        working-directory: repo
        env:
          APK_BASE_URL: >-
            https://raw.githubusercontent.com/DTD2604/mihon-extensions/refs/heads/repo/apk
          ICON_BASE_URL: >-
            https://raw.githubusercontent.com/DTD2604/mihon-extensions/refs/heads/repo/icon
        shell: bash
        run: |
          set -euo pipefail

          python ../main/.github/scripts/publish-repo.py '[]'

      - name: Commit repository changes
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git status

          if [ -z "$(git status --porcelain)" ]; then
            echo "Không có thay đổi để commit"
            exit 0
          fi

          git add .
          git commit -m "Update DamCoNuong extension"
          git push origin repo
